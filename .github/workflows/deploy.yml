name: Deploy Adventure Asia API

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pgsql, redis, mbstring, xml, curl, zip, bcmath

      - name: Install dependencies
        run: composer install --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run tests
        run: ./vendor/bin/phpunit

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_DEV }}:role/AA-CICD
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload deploy script to S3
        run: |
          cat > /tmp/deploy.sh << 'DEPLOY'
          #!/bin/bash
          set -e
          export HOME=/root
          cd /var/www/aaa-api

          echo "=== Git Pull ==="
          git pull origin develop

          echo "=== Fetch Secrets ==="
          DB_SECRET=$(/usr/bin/aws secretsmanager get-secret-value \
            --secret-id aa/dev/db --region ap-southeast-1 \
            --query SecretString --output text)
          DB_HOST=$(echo $DB_SECRET | python3 -c "import sys,json; print(json.load(sys.stdin)['host'])")
          DB_PASS=$(echo $DB_SECRET | python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")
          DB_USER=$(echo $DB_SECRET | python3 -c "import sys,json; print(json.load(sys.stdin)['username'])")
          DB_NAME=$(echo $DB_SECRET | python3 -c "import sys,json; print(json.load(sys.stdin)['dbname'])")
          REDIS_SECRET=$(/usr/bin/aws secretsmanager get-secret-value \
            --secret-id aa/dev/redis --region ap-southeast-1 \
            --query SecretString --output text)
          REDIS_HOST=$(echo $REDIS_SECRET | python3 -c "import sys,json; print(json.load(sys.stdin)['host'])")

          sed -i "s|^DB_HOST=.*|DB_HOST=$DB_HOST|" .env
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=$DB_PASS|" .env
          sed -i "s|^DB_USERNAME=.*|DB_USERNAME=$DB_USER|" .env
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=$DB_NAME|" .env
          sed -i "s|^REDIS_HOST=.*|REDIS_HOST=$REDIS_HOST|" .env

          echo "=== Composer Install ==="
          COMPOSER_ALLOW_SUPERUSER=1 HOME=/root php /usr/local/bin/composer \
            install --no-dev --optimize-autoloader

          echo "=== Migrate ==="
          php artisan migrate --force

          echo "=== Cache ==="
          php artisan config:cache
          php artisan route:cache

          echo "=== Reload PHP-FPM ==="
          systemctl reload php8.2-fpm

          echo "=== DEPLOY DONE ==="
          DEPLOY

          aws s3 cp /tmp/deploy.sh \
            s3://aa-dev-deploy-710590321660/scripts/deploy.sh \
            --region ap-southeast-1

      - name: Run deploy on EC2
        id: deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID_DEV }} \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters '{"commands":[
              "/usr/bin/aws s3 cp s3://aa-dev-deploy-710590321660/scripts/deploy.sh /tmp/deploy.sh --region ap-southeast-1",
              "bash /tmp/deploy.sh"
            ]}' \
            --region ap-southeast-1 \
            --query 'Command.CommandId' \
            --output text)
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV
          echo "Command ID: $COMMAND_ID"

      - name: Wait and check deploy result
        run: |
          echo "Waiting 90 seconds..."
          sleep 90
          STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id ${{ secrets.EC2_INSTANCE_ID_DEV }} \
            --region ap-southeast-1 \
            --query 'Status' --output text)
          echo "Deploy status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "❌ Deploy failed"
            aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id ${{ secrets.EC2_INSTANCE_ID_DEV }} \
              --region ap-southeast-1 \
              --query 'StandardErrorContent' --output text
            exit 1
          fi
          echo "✅ Deploy successful"

      - name: Health check
        run: |
          sleep 5
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://aa-alb-dev-1308152565.ap-southeast-1.elb.amazonaws.com/api/health)
          echo "Health check: HTTP $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Health check failed"
            exit 1
          fi
          echo "✅ Health check passed"

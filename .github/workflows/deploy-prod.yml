name: Deploy to PROD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.PROD_AWS_REGION }}

      - name: Package application
        run: |
          zip -r /tmp/app-${{ github.sha }}.zip . \
            --exclude "*.git*" \
            --exclude "tests/*" \
            --exclude "node_modules/*" \
            --exclude ".env*" \
            --exclude "storage/logs/*"
          echo "Package size: $(du -sh /tmp/app-${{ github.sha }}.zip)"
          echo "Verify: $(unzip -l /tmp/app-${{ github.sha }}.zip | grep composer.json)"

      - name: Upload release to S3
        run: |
          aws s3 cp /tmp/app-${{ github.sha }}.zip \
            s3://${{ secrets.PROD_S3_BUCKET }}/releases/app-${{ github.sha }}.zip
          echo "RELEASE_S3=s3://${{ secrets.PROD_S3_BUCKET }}/releases/app-${{ github.sha }}.zip" \
            >> $GITHUB_ENV
          echo "✅ Release uploaded: app-${{ github.sha }}.zip"

      - name: Deploy to EC2 via SSM
        run: |
          # Tạo pre-signed URLs (valid 1 giờ) — EC2 dùng curl, không cần AWS CLI
          SCRIPT_URL=$(aws s3 presign \
            s3://${{ secrets.PROD_S3_BUCKET }}/scripts/ec2-deploy.sh \
            --expires-in 3600)

          RELEASE_URL=$(aws s3 presign \
            s3://${{ secrets.PROD_S3_BUCKET }}/releases/app-${{ github.sha }}.zip \
            --expires-in 3600)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.PROD_EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters "{
              \"commands\":[
                \"curl -sL '${SCRIPT_URL}' -o /tmp/ec2-deploy.sh\",
                \"curl -sL '${RELEASE_URL}' -o /tmp/release-${{ github.sha }}.zip\",
                \"chmod +x /tmp/ec2-deploy.sh\",
                \"bash /tmp/ec2-deploy.sh /tmp/release-${{ github.sha }}.zip 2>&1\"
              ],
              \"executionTimeout\":[\"600\"]
            }" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait for deployment
        run: |
          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id ${{ secrets.PROD_EC2_INSTANCE_ID }} \
              --query 'Status' --output text 2>/dev/null || echo "Pending")

            echo "[$i/30] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Deployment successful!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.PROD_EC2_INSTANCE_ID }} \
                --query 'StandardOutputContent' --output text
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ Deployment failed!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.PROD_EC2_INSTANCE_ID }} \
                --query '{Out:StandardOutputContent,Err:StandardErrorContent}' \
                --output json
              exit 1
            fi
            sleep 20
          done

      - name: Health check via ALB
        run: |
          ALB="aa-alb-prod-203362903.ap-southeast-1.elb.amazonaws.com"
          echo "Testing: http://$ALB/api/health"
          sleep 15
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$ALB/api/health)
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed!"
              curl -s http://$ALB/api/health
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Cleanup old releases (keep last 5)
        if: success()
        run: |
          OLD=$(aws s3 ls s3://${{ secrets.PROD_S3_BUCKET }}/releases/ \
            | sort | head -n -5 | awk '{print $4}')
          for f in $OLD; do
            aws s3 rm s3://${{ secrets.PROD_S3_BUCKET }}/releases/$f
            echo "Deleted: $f"
          done
          echo "✅ Cleanup done"
